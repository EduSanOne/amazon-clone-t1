<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Store</title>
    <link rel="stylesheet" href="styles/shared/amazon-header.css">
    <link rel="stylesheet" href="styles/amazon.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
    <header>
        <div class="amazon-header">
            
            <div class="header-left-side">
                <a href="amazon.html" class="header-link">
                    <img src="images/amazon-logo-white.png" alt="" class="amazon-logo">
                    <span class="extend-logo">.com.br</span>
                </a>
            </div>
            <div class="zipcode-side">
                    <div class="zipcode-sprite"></div>
                    <div class="zipcode-complete">
                        <div class="zipcode-part1">A entrega será feita em Bela Vista 01319</div>
                        <div class="zipcode-part2">Atualizar CEP</div>
                    </div>
            </div>

            <div class="search-bar-area">
                <select name="" id="" class="select-input">
                    <option value="#" class="select-option">Todos</option>
                    <option value="#" class="select-option">Todos os departamentos</option>
                </select>
                <input type="text" class="search-bar-input" placeholder="Pesquisar Amazon.com.br">
                <button class="box-magnifying-glass">
                    <img src="images/icons/search-icon.png" alt="" class="magnifying-glass-img">
                </button>
            </div>

            <div class="header-right-side">
                <div class="login-side">
                    Olá, faça seu login<br> <strong>Contas e Listas</strong> 
                </div> 
                
                
                <div class="orders-side">
                   Devoluções<br><strong>e Pedidos</strong> 
                </div>

                <div class="box-cart">
                    <img src="images/icons/cart-icon.png" alt="" class="cart-img">
                    <div class="cart-quantity">0</div>
                    <div class="cart-name">Carrinho</div>
                </div>
            </div>

        </div>
    </header>
    <main>
        <div class="products-container">
            
            <div class="banner-promo-box">
                <div class="slides-promo">
                    <img src="images/amazon-download-utility/1.jpg" alt="" srcset="" class="promo-image">
                    <img src="images/amazon-download-utility/2.jpg" alt="" srcset="" class="promo-image">
                    <img src="images/amazon-download-utility/3.jpg" alt="" srcset="" class="promo-image">
                    <img src="images/amazon-download-utility/4.jpg" alt="" srcset="" class="promo-image">
                    <img src="images/amazon-download-utility/5.jpg" alt="" srcset="" class="promo-image">
                    <img src="images/amazon-download-utility/6.jpg" alt="" srcset="" class="promo-image">
                    <img src="images/amazon-download-utility/7.jpg" alt="" srcset="" class="promo-image">
                </div>

                <div class="buttons-slide">
                    <button><i class="fa-solid fa-angle-left" id="button-left"></i></button>
                    <button><i class="fa-solid fa-angle-right" id="button-right"></i></button>
                </div>
            </div>

            
            <div class="grid-layout"></div>
            <!--PRODUCTS GENERATE BY JS-->
        </div>
    </main>
    <footer>
        
    </footer>
</body>
<script type="module" src="script/amazon.js"></script>
<script src="https://kit.fontawesome.com/9a922a6e1e.js" crossorigin="anonymous"></script>

</html>
